name: Verana E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Download Keplr extension
        run: npm run download:keplr
      - name: Start Xvfb
        run: |
          sudo pkill -f 'Xvfb :99' || true
          sudo rm -f /tmp/.X99-lock /tmp/.X11-unix/X99 || true
          sleep 1
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          SECRET_WORDS: ${{ secrets.SECRET_WORDS }}
          CYPRESS_WALLET_PASSWORD: ${{ secrets.CYPRESS_WALLET_PASSWORD }}
          DISPLAY: ':99'
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: tests/e2e/screenshots